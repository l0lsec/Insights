<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <!-- Purple gradient for the badge container and orbit dots -->
    <linearGradient id="podGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>

    <!-- Amber gradient for the central insight spark -->
    <linearGradient id="sparkGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>

    <!-- Soft glow used by the central spark -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Badge container -->
  <circle cx="60" cy="60" r="56" fill="#0F0A1F"/>
  <circle cx="60" cy="60" r="56" fill="url(#podGradient)" opacity="0.15"/>
  <circle cx="60" cy="60" r="54" stroke="url(#podGradient)" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Orbital insight dots: ideas/data points coalescing toward the spark -->
  <g>
    <circle cx="60"  cy="18"  r="2.4" fill="#A78BFA" opacity="0.75"/>
    <circle cx="96"  cy="34"  r="2.0" fill="#A78BFA" opacity="0.6"/>
    <circle cx="104" cy="72"  r="1.8" fill="#7C3AED" opacity="0.55"/>
    <circle cx="86"  cy="100" r="2.2" fill="#A78BFA" opacity="0.7"/>
    <circle cx="44"  cy="104" r="1.6" fill="#7C3AED" opacity="0.5"/>
    <circle cx="18"  cy="80"  r="2.0" fill="#A78BFA" opacity="0.6"/>
    <circle cx="14"  cy="46"  r="1.8" fill="#7C3AED" opacity="0.55"/>
    <circle cx="34"  cy="22"  r="1.6" fill="#A78BFA" opacity="0.5"/>
  </g>

  <!-- Central insight spark -->
  <g transform="translate(60, 60)" filter="url(#glow)">
    <!-- Main 8-point spark (scaled-up version of the original glyph) -->
    <path d="M0 -28 L5 -7 L24 0 L5 7 L0 28 L-5 7 L-24 0 L-5 -7 Z"
          fill="url(#sparkGradient)"/>

    <!-- Small accent sparkles flanking the central spark -->
    <g opacity="0.9">
      <path d="M18 -20 L19.2 -16.4 L23 -15.4 L19.8 -13.2 L18.6 -9.6 L17.4 -13.2 L13.6 -15.4 L17.4 -16.4 Z"
            fill="#FBBF24"/>
      <path d="M-22 18 L-21.1 20.7 L-18.2 21.5 L-20.6 23.1 L-21.5 25.8 L-22.4 23.1 L-25.3 21.5 L-22.9 20.7 Z"
            fill="#FBBF24" opacity="0.85"/>
      <circle cx="22" cy="20" r="1.6" fill="#FBBF24" opacity="0.8"/>
      <circle cx="-18" cy="-22" r="1.2" fill="#FBBF24" opacity="0.7"/>
    </g>
  </g>
</svg>
